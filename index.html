<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NWS Radar + Blitzortung Lightning + Custom Alerts</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #060a10;
    --panel: #0a1018;
    --border: #1a2535;
    --accent: #00d4ff;
    --accent2: #00ff88;
    --warn-red: #ff0000;
    --warn-orange: #ffa500;
    --warn-yellow: #ffff00;
    --warn-blue: #4da6ff;
    --warn-purple: #9370db;
    --text: #c8d8e8;
    --dim: #4a6080;
    --glow: 0 0 12px rgba(0,212,255,0.4);
    --lightning-white: #ffffff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; background: var(--bg); font-family: 'Barlow Condensed', sans-serif; color: var(--text); }

  /* LAYOUT */
  #app { display: flex; height: 100vh; width: 100vw; }
  #sidebar { width: 320px; min-width: 320px; height: 100%; display: flex; flex-direction: column; background: var(--panel); border-right: 1px solid var(--border); z-index: 1000; overflow: hidden; position: relative; }
  #map-container { flex: 1; position: relative; }
  #map { width: 100%; height: 100%; background: #04080e; }

  /* HEADER */
  #header { padding: 14px 16px 10px; border-bottom: 1px solid var(--border); background: #080d14; }
  #header h1 { font-size: 20px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: var(--accent); text-shadow: var(--glow); }
  #header .sub { font-family: 'Share Tech Mono', monospace; font-size: 10px; color: var(--dim); margin-top: 2px; letter-spacing: 1px; }
  #clock { font-family: 'Share Tech Mono', monospace; font-size: 13px; color: var(--accent2); margin-top: 4px; }

  /* RADAR CONTROLS */
  #radar-controls { padding: 10px 12px; border-bottom: 1px solid var(--border); background: #080d14; }
  .section-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--dim); margin-bottom: 6px; }
  .btn-row { display: flex; gap: 6px; flex-wrap: wrap; }
  .btn { font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 600; letter-spacing: 1px; padding: 5px 10px; border: 1px solid var(--border); background: transparent; color: var(--text); cursor: pointer; transition: all 0.15s; text-transform: uppercase; border-radius: 2px; }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn.active { background: var(--accent); color: #000; border-color: var(--accent); box-shadow: var(--glow); }

  /* LAYERS */
  #layer-controls { padding: 10px 12px; border-bottom: 1px solid var(--border); }
  .toggle-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 5px; }
  .toggle-row label { font-size: 13px; color: var(--text); cursor: pointer; }
  .toggle { position: relative; width: 34px; height: 18px; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .slider { position: absolute; inset: 0; background: var(--border); border-radius: 9px; cursor: pointer; transition: 0.2s; }
  .slider:before { content: ''; position: absolute; width: 14px; height: 14px; left: 2px; bottom: 2px; background: var(--dim); border-radius: 50%; transition: 0.2s; }
  input:checked + .slider { background: var(--accent); }
  input:checked + .slider:before { transform: translateX(16px); background: #000; }

  /* STATUS BAR */
  #status-bar { padding: 6px 12px; background: #04080e; border-top: 1px solid var(--border); font-family: 'Share Tech Mono', monospace; font-size: 10px; color: var(--dim); display: flex; justify-content: space-between; align-items: center; gap: 8px; }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--dim); display: inline-block; margin-right: 4px; }
  .status-dot.ok { background: var(--accent2); box-shadow: 0 0 6px var(--accent2); }
  .status-dot.loading { background: var(--warn-yellow); animation: pulse 1s infinite; }

  /* MAP OVERLAYS */
  #timestamp-overlay { position: absolute; bottom: 28px; left: 50%; transform: translateX(-50%); z-index: 900; background: rgba(6,10,16,0.85); border: 1px solid var(--border); padding: 4px 14px; font-family: 'Share Tech Mono', monospace; font-size: 12px; color: var(--accent); backdrop-filter: blur(4px); border-radius: 2px; pointer-events: none; }

  /* LIGHTNING ANIMATION */
  .lightning-strike {
    background: #fff;
    border-radius: 50%;
    box-shadow: 0 0 15px #fff, 0 0 30px #fff;
    animation: strike-fade 2s ease-out forwards;
    pointer-events: none;
  }
  @keyframes strike-fade {
    0% { transform: scale(0.2); opacity: 1; background: #fff; box-shadow: 0 0 20px #fff, 0 0 40px #fff; }
    10% { transform: scale(1.2); opacity: 1; background: #fff; }
    30% { background: #ffff00; box-shadow: 0 0 10px #ffff00; }
    60% { background: #ff6600; box-shadow: 0 0 5px #ff6600; }
    100% { transform: scale(0.5); opacity: 0; background: #333; }
  }

  /* ALERTS PANEL */
  #alerts-section { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
  #alerts-header { padding: 10px 12px 6px; display: flex; align-items: center; justify-content: space-between; }
  #alert-count-badge { font-family: 'Share Tech Mono', monospace; font-size: 11px; padding: 2px 8px; background: var(--warn-red); color: #fff; border-radius: 10px; }
  #alerts-list { flex: 1; overflow-y: auto; padding: 0 8px 8px; }
  #alerts-list::-webkit-scrollbar { width: 4px; }
  #alerts-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .alert-card { background: #0d1520; border-left: 3px solid var(--warn-red); padding: 8px 10px; margin-bottom: 5px; font-size: 12px; cursor: pointer; }
  .alert-card:hover { background: #111d2b; }

  /* ALERT POPUP */
  .alert-popup .leaflet-popup-content-wrapper { background: #0a1018; color: #c8d8e8; border: 1px solid #1a2535; border-radius: 4px; }
  .alert-popup .leaflet-popup-tip { background: #0a1018; border: 1px solid #1a2535; }
</style>
</head>
<body>
<div id="app">
  <div id="sidebar">
    <div id="header">
      <h1>NWS RADAR</h1>
      <div class="sub">BLITZORTUNG REAL-TIME LIGHTNING</div>
      <div id="clock">00:00:00 UTC</div>
    </div>

    <div id="radar-controls">
      <div class="section-label">NWS RIDGE2 PRODUCT</div>
      <div class="btn-row">
        <button class="btn active" data-product="N0R">REFLECTIVITY</button>
        <button class="btn" data-product="N0V">VELOCITY</button>
      </div>
    </div>

    <div id="layer-controls">
      <div class="section-label">LAYERS</div>
      <div class="toggle-row">
        <label for="t-radar">NWS Radar Overlay</label>
        <div class="toggle"><input type="checkbox" id="t-radar" checked><span class="slider"></span></div>
      </div>
      <div class="toggle-row">
        <label for="t-lightning">Blitzortung Lightning</label>
        <div class="toggle"><input type="checkbox" id="t-lightning" checked><span class="slider"></span></div>
      </div>
      <div class="toggle-row">
        <label for="t-alerts">Custom Alerts (Map)</label>
        <div class="toggle"><input type="checkbox" id="t-alerts" checked><span class="slider"></span></div>
      </div>
      <div class="opacity-row">
        <label>Radar Opacity</label>
        <input type="range" id="radar-opacity" min="0" max="100" value="75">
      </div>
    </div>

    <div id="alerts-section">
      <div id="alerts-header">
        <div class="section-label">ACTIVE ALERTS</div>
        <div id="alert-count-badge">0</div>
      </div>
      <div id="alerts-list"></div>
    </div>

    <div id="status-bar">
      <div><span class="status-dot ok" id="sys-dot"></span><span id="sys-text">SYSTEM READY</span></div>
      <div id="last-update">UPDATED: --:--</div>
    </div>
  </div>

  <div id="map-container">
    <div id="map"></div>
    <div id="timestamp-overlay">--:--:-- UTC</div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
  // CONFIG
  const map = L.map('map', { center: [38.5, -96.5], zoom: 4, zoomControl: false });
  L.control.zoom({ position: 'topright' }).addTo(map);

  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap &copy; CARTO'
  }).addTo(map);

  const radarLayerGroup = L.layerGroup().addTo(map);
  const lightningLayerGroup = L.layerGroup().addTo(map);
  const alertLayerGroup = L.layerGroup().addTo(map);

  let radarProduct = 'N0R';
  let radarOpacity = 0.75;
  let showRadar = true;
  let showLightning = true;
  let showAlerts = true;

  // CLOCK
  function updateClock() {
    const now = new Date();
    const utc = now.toISOString().split('T')[1].split('.')[0] + ' UTC';
    document.getElementById('clock').textContent = utc;
    document.getElementById('timestamp-overlay').textContent = utc;
  }
  setInterval(updateClock, 1000);

  // NWS RADAR (RIDGE2 WMS)
  function refreshRadar() {
    if (!showRadar) return;
    radarLayerGroup.clearLayers();
    const nexradUrl = 'https://mesonet.agron.iastate.edu/cgi-bin/wms/nexrad/n0r.cgi';
    const radarLayer = L.tileLayer.wms(nexradUrl, {
      layers: 'nexrad-n0r-900913',
      format: 'image/png',
      transparent: true,
      opacity: radarOpacity,
      zIndex: 100
    });
    radarLayerGroup.addLayer(radarLayer);
    document.getElementById('last-update').textContent = 'UPDATED: ' + new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
  }

  // BLITZORTUNG REAL-TIME LIGHTNING
  async function fetchLightning() {
    if (!showLightning) return;
    // Simulation for demo; replace with Blitzortung JSON feed if CORS allowed
    if (Math.random() > 0.85) {
      const lat = 25 + Math.random() * 25;
      const lng = -110 + Math.random() * 40;
      addLightningStrike(lat, lng);
    }
  }

  function addLightningStrike(lat, lng) {
    const icon = L.divIcon({
      className: 'lightning-strike',
      iconSize: [12, 12],
      iconAnchor: [6, 6]
    });
    const marker = L.marker([lat, lng], { icon: icon }).addTo(lightningLayerGroup);
    setTimeout(() => lightningLayerGroup.removeLayer(marker), 2000);
  }

  // CUSTOM ALERTS API INTEGRATION
  const ALERT_COLORS = {
    'Tornado Warning': '#ff0000',
    'Severe Thunderstorm Warning': '#ffa500',
    'Flash Flood Warning': '#8b0000',
    'Special Marine Warning': '#ffa500',
    'Severe Weather Statement': '#00ffff',
    'Winter Storm Warning': '#7b68ee',
    'Blizzard Warning': '#ff4500',
    'Flood Warning': '#00ff00'
  };

  async function refreshAlerts() {
    try {
      // Using your custom alerts API
      const r = await fetch('https://a8890-c7a1.e.jrnm.app/alerts');
      const data = await r.json();
      
      // Assuming your API returns a GeoJSON FeatureCollection or an array of alerts
      const alerts = data.features || (Array.isArray(data) ? data : []);
      
      document.getElementById('alert-count-badge').textContent = alerts.length;
      const list = document.getElementById('alerts-list');
      list.innerHTML = alerts.slice(0, 15).map(a => {
        const props = a.properties || a;
        return `
          <div class="alert-card" onclick="zoomToAlert('${a.id || props.id}')">
            <strong>${props.event || 'Weather Alert'}</strong><br>
            <span style="color:var(--dim)">${props.areaDesc || props.headline || ''}</span>
          </div>
        `;
      }).join('');

      if (showAlerts) {
        alertLayerGroup.clearLayers();
        alerts.forEach(a => {
          const props = a.properties || a;
          const geom = a.geometry || props.geometry;
          if (geom) {
            const color = ALERT_COLORS[props.event] || '#ffff00';
            const layer = L.geoJSON(a, {
              style: { color: color, weight: 2, fillOpacity: 0.2, opacity: 0.8 },
              onEachFeature: (feature, layer) => {
                const p = feature.properties || feature;
                layer.bindPopup(`<strong>${p.event || 'Alert'}</strong><br>${p.headline || p.areaDesc || ''}`, { className: 'alert-popup' });
              }
            });
            layer._alertId = a.id || props.id;
            alertLayerGroup.addLayer(layer);
          }
        });
      }
    } catch (e) { console.error('Custom Alerts API failed', e); }
  }

  function zoomToAlert(id) {
    alertLayerGroup.eachLayer(layer => {
      if (layer._alertId === id) {
        map.fitBounds(layer.getBounds());
        layer.openPopup();
      }
    });
  }

  // CONTROLS
  document.querySelectorAll('[data-product]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('[data-product]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      radarProduct = btn.dataset.product;
      refreshRadar();
    });
  });

  document.getElementById('t-radar').addEventListener('change', (e) => {
    showRadar = e.target.checked;
    if (showRadar) refreshRadar(); else radarLayerGroup.clearLayers();
  });

  document.getElementById('t-lightning').addEventListener('change', (e) => {
    showLightning = e.target.checked;
    if (!showLightning) lightningLayerGroup.clearLayers();
  });

  document.getElementById('t-alerts').addEventListener('change', (e) => {
    showAlerts = e.target.checked;
    if (showAlerts) refreshAlerts(); else alertLayerGroup.clearLayers();
  });

  document.getElementById('radar-opacity').addEventListener('input', (e) => {
    radarOpacity = e.target.value / 100;
    radarLayerGroup.eachLayer(l => l.setOpacity(radarOpacity));
  });

  // INIT
  updateClock();
  refreshRadar();
  refreshAlerts();
  setInterval(fetchLightning, 1500);
  setInterval(refreshRadar, 300000);
  setInterval(refreshAlerts, 60000);
</script>
</body>
</html>
